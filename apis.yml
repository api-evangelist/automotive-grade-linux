aid: automotive-grade-linux
name: Automotive Grade Linux
description: >-
  Automotive Grade Linux (AGL) is a collaborative open source project under the Linux
  Foundation that develops a unified software platform for connected vehicles. AGL brings
  together automakers (Toyota, Honda, Mercedes-Benz), suppliers, and technology companies
  to build an open Linux-based software stack for in-vehicle infotainment, instrument
  clusters, telematics, and software-defined vehicle (SoDeV) architectures. The platform
  decouples software from hardware enabling rapid automotive application development.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Automotive
  - Connected Vehicles
  - Embedded Linux
  - In-Vehicle Infotainment
  - IoT
  - Linux Foundation
  - Open Source
  - Software Defined Vehicles
url: >-
  https://raw.githubusercontent.com/api-evangelist/automotive-grade-linux/refs/heads/main/apis.yml
created: '2026-03-16'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: automotive-grade-linux:agl-application-framework-api
    name: AGL Application Framework API
    description: >-
      The AGL Application Framework provides APIs for managing applications on
      the AGL platform including installation, lifecycle management, permission
      enforcement, and inter-application communication. Applications interact
      with vehicle services through the Application Framework using D-Bus and
      WebSocket-based APIs.
    humanURL: https://docs.automotivelinux.org/en/master/#0_Getting_Started/2_Developing_an_AGL_Application/
    tags:
      - Application Framework
      - Lifecycle Management
      - IVI
      - D-Bus
    properties:
      - type: Documentation
        url: https://docs.automotivelinux.org/en/master/#0_Getting_Started/2_Developing_an_AGL_Application/

  - aid: automotive-grade-linux:vsomeip-service-api
    name: AGL VSOMEIP Service API
    description: >-
      AGL uses SOME/IP (Scalable service-Oriented MiddlewarE over IP) via the
      vSomeIP library for vehicle service communication. This enables microservice
      communication between ECUs over Ethernet using the SOME/IP protocol,
      supporting service discovery, request-response, and event notification
      patterns for in-vehicle networks.
    humanURL: https://github.com/COVESA/vsomeip
    tags:
      - SOME/IP
      - Vehicle Services
      - ECU Communication
      - Ethernet
      - Microservices
    properties:
      - type: Documentation
        url: https://github.com/COVESA/vsomeip
      - type: GitHubRepository
        url: https://github.com/COVESA/vsomeip

  - aid: automotive-grade-linux:sodev-api
    name: AGL SoDeV Software Defined Vehicle API
    description: >-
      The AGL SoDeV (Software Defined Vehicle) reference platform provides APIs
      for software-defined vehicle architectures that decouple software from
      hardware. SoDeV builds on Zephyr RTOS and meta-AGL layers to provide
      a foundation for developing modern in-vehicle computing architectures
      with over-the-air update capabilities and service-oriented interfaces.
    humanURL: https://www.automotivelinux.org
    tags:
      - Software Defined Vehicles
      - Zephyr
      - OTA Updates
      - Vehicle Computing
    properties:
      - type: Documentation
        url: https://docs.automotivelinux.org
      - type: GitHubRepository
        url: https://github.com/automotive-grade-linux/meta-agl-monorepo

