  - type: Features
    data:
      - name: Yocto-Based Build System
        description: >-
          AGL uses the Yocto Project and OpenEmbedded build framework with
          meta-AGL layers for creating customized embedded Linux distributions
          targeting automotive hardware platforms including Renesas R-Car and Raspberry Pi.
      - name: SOME/IP Vehicle Services
        description: >-
          Service-oriented in-vehicle communication using the SOME/IP protocol
          via vSomeIP for microservice architectures across ECUs over automotive
          Ethernet networks.
      - name: Software Defined Vehicle (SoDeV)
        description: >-
          AGL SoDeV reference platform for decoupling software from hardware,
          enabling flexible, updatable in-vehicle software architectures using
          Zephyr RTOS and container-based application isolation.
      - name: Over-The-Air Updates
        description: >-
          OTA update framework for delivering software updates to AGL-based
          in-vehicle systems without physical access, supporting fleet-wide
          update management.
      - name: IVI and Instrument Cluster Support
        description: >-
          Wayland/Weston-based display framework for in-vehicle infotainment
          and digital instrument cluster applications with automotive-grade
          display requirements.
  - type: UseCases
    data:
      - name: In-Vehicle Infotainment Development
        description: >-
          Develop navigation, media, and connectivity applications for
          automotive head units using AGL application framework APIs and
          the Wayland display system.
      - name: Connected Car Platform
        description: >-
          Build telematics, V2X communication, and cloud connectivity
          capabilities on AGL-based vehicle computing platforms.
      - name: Software Defined Vehicle Architecture
        description: >-
          Design vehicle software architectures that decouple application
          software from hardware using AGL SoDeV as the foundation platform.
      - name: Instrument Cluster Applications
        description: >-
          Create digital instrument cluster applications for speedometers,
          tachometers, and ADAS status displays using AGL display APIs.
  - type: Integrations
    data:
      - name: COVESA Vehicle Signal Specification
        description: >-
          Integration with the COVESA Vehicle Signal Specification (VSS)
          for standardized access to vehicle sensor and actuator data.
      - name: Eclipse KUKSA
        description: >-
          Integration with Eclipse KUKSA for vehicle signal API abstraction
          enabling portable in-vehicle application development.
      - name: Zephyr RTOS
        description: >-
          AGL SoDeV integrates Zephyr RTOS for safety-critical microcontroller
          domains within software-defined vehicle architectures.
      - name: Renesas R-Car Platforms
        description: >-
          Primary hardware reference platform support for Renesas R-Car SoCs
          used in production automotive IVI and cluster systems.
